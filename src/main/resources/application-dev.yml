spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

application:
  security:
    jwt:
      secret: ${DEV_SECRET_KEY}
      expiration: ${JWT_KEY_EXPIRATION}
      refresh-token:
        expiration: ${JWT_REFRESH_KEY_EXPIRATION}

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG