spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

application:
  security:
    jwt:
      secret: ${DEV_SECRET_KEY}
      expiration: ${JWT_KEY_EXPIRATION}
      refresh-token:
        expiration: ${JWT_REFRESH_KEY_EXPIRATION}

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG